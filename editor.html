<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Maki Editor</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg:      #161616;
      --surface: #1f1f1f;
      --border:  #2e2e2e;
      --accent:  #4ade80;
      --text:    #e2e2e2;
      --muted:   #666;
    }
    html, body {
      width: 100%; height: 100%;
      background: var(--bg); color: var(--text);
      font-family: 'Menlo', 'Consolas', monospace;
      font-size: 13px; overflow: hidden;
    }

    /* ── Tab bar ── */
    #tab-bar {
      display: flex;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 12px;
      height: 38px;
      align-items: flex-end;
      gap: 2px;
    }
    .tab-btn {
      padding: 8px 18px 7px;
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      font-family: inherit; font-size: 12px;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      letter-spacing: .3px;
    }
    .tab-btn.active  { color: var(--text); border-bottom-color: var(--accent); }
    .tab-btn:hover:not(.active) { color: #aaa; }

    /* ── Panels ── */
    .panel { display: none; height: calc(100vh - 38px); }
    .panel.active { display: flex; }

    #panel-tilemap {
      align-items: center; justify-content: center;
      color: var(--muted); font-size: 12px;
    }

    /* ── Collisions layout ── */
    #panel-collisions { flex-direction: row; }

    /* Sidebar – prefab list */
    #prefab-sidebar {
      width: 150px; flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 14px 8px;
      overflow-y: auto;
    }
    #prefab-sidebar .sidebar-title {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 1px; color: var(--muted);
      padding: 0 4px 8px;
    }
    .prefab-item {
      padding: 6px 8px; cursor: pointer;
      border-radius: 4px; color: var(--text);
      font-size: 12px;
    }
    .prefab-item:hover { background: #2a2a2a; }
    .prefab-item.active { background: #1e2e1e; color: var(--accent); }

    /* Canvas area */
    #canvas-area {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      background: #111;
      position: relative;
    }
    #canvas-hint {
      position: absolute; bottom: 10px;
      left: 50%; transform: translateX(-50%);
      color: var(--muted); font-size: 11px;
      pointer-events: none; white-space: nowrap;
    }

    /* Controls sidebar */
    #controls-sidebar {
      width: 210px; flex-shrink: 0;
      background: var(--surface);
      border-left: 1px solid var(--border);
      padding: 16px 14px;
      display: flex; flex-direction: column; gap: 18px;
      overflow-y: auto;
    }
    .ctrl-section-title {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 1px; color: var(--muted);
      margin-bottom: 8px;
    }
    .field-row {
      display: flex; align-items: center;
      gap: 8px; margin-bottom: 6px;
    }
    .field-row label {
      width: 52px; color: var(--muted); font-size: 11px;
    }
    .field-row input {
      flex: 1; background: #2a2a2a;
      border: 1px solid var(--border);
      color: var(--text); padding: 4px 7px;
      font-family: inherit; font-size: 12px;
      border-radius: 3px;
    }
    .field-row input:focus { outline: none; border-color: var(--accent); }

    .code-box {
      background: #0e0e0e;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 9px 10px;
      font-size: 11px; line-height: 1.6;
      color: #7aff9a;
      white-space: pre;
      cursor: pointer;
      user-select: all;
    }
    .code-box:hover { border-color: var(--accent); }

    #copy-msg {
      text-align: center; font-size: 11px;
      color: var(--accent); height: 16px;
      opacity: 0; transition: opacity .25s;
    }
    #copy-msg.show { opacity: 1; }

    .btn-row { display: flex; gap: 8px; }
    .btn {
      flex: 1; padding: 7px 8px;
      background: #2a2a2a; border: 1px solid var(--border);
      color: var(--text); border-radius: 3px;
      cursor: pointer; font-family: inherit; font-size: 12px;
    }
    .btn:hover { background: #333; }
    .btn.primary {
      background: #1a2e1a; border-color: var(--accent);
      color: var(--accent);
    }
    .btn.primary:hover { background: #233023; }

    .divider {
      border: none; border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <div id="tab-bar">
    <button class="tab-btn" data-tab="tilemap">Tilemap</button>
    <button class="tab-btn active" data-tab="collisions">Collisions</button>
  </div>

  <div id="panel-tilemap" class="panel">
    Tilemap editor — coming soon
  </div>

  <div id="panel-collisions" class="panel active">

    <div id="prefab-sidebar">
      <div class="sidebar-title">Prefabs</div>
      <div id="prefab-list"></div>
    </div>

    <div id="canvas-area">
      <div id="phaser-container"></div>
      <span id="canvas-hint">drag · drag corners to resize</span>
    </div>

    <div id="controls-sidebar">

      <div>
        <div class="ctrl-section-title">Body Size</div>
        <div class="field-row"><label>Width</label><input id="inp-w"  type="number" min="1"></div>
        <div class="field-row"><label>Height</label><input id="inp-h"  type="number" min="1"></div>
      </div>

      <hr class="divider">

      <div>
        <div class="ctrl-section-title">Body Offset</div>
        <div class="field-row"><label>Offset X</label><input id="inp-ox" type="number"></div>
        <div class="field-row"><label>Offset Y</label><input id="inp-oy" type="number"></div>
      </div>

      <hr class="divider">

      <div>
        <div class="ctrl-section-title">Code</div>
        <div class="code-box" id="code-output">—</div>
        <div id="copy-msg">Copied!</div>
      </div>

      <div class="btn-row">
        <button class="btn primary" id="btn-copy">Copy</button>
        <button class="btn" id="btn-export">Save</button>
      </div>

    </div>
  </div>

  <script type="module" src="./editor/editor.js"></script>
</body>
</html>
